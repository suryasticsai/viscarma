<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VisCarMa · devAIne Agent</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Header -->
  <div class="flex header">
    <div class="flex">
      <span class="logo">Vis<span class="accent">Car</span>Ma</span>
      <span class="badge">Hybrid</span>
    </div>
    <div class="flex">
      <span id="user-info" style="font-size:12px;color:#4a5568;"></span>
      <button class="btn btn-ghost" id="login-btn" onclick="login()">Login with GitHub</button>
    </div>
  </div>

  <!-- Main Controls -->
  <div class="box">
    <div class="flex" style="justify-content:space-between;">
      <div class="flex" style="flex:1;">
        <!-- Manual input -->
        <input type="text" id="repo-url-input" placeholder="https://github.com/owner/repo" style="flex:2;min-width:200px;" />
        <button class="btn" onclick="scanManual()">🔍 Scan Public Repo</button>
      </div>
      <div class="flex" style="flex:1;justify-content:flex-end;">
        <select id="repo-select" style="flex:1;min-width:150px;display:none;" onchange="selectRepo()">
          <option value="">Select repo</option>
        </select>
        <button class="btn btn-primary" id="scan-logged-btn" onclick="scanLoggedIn()" style="display:none;">🚀 Scan Selected</button>
      </div>
    </div>
    <div style="font-size:10px;color:#4a5568;margin-top:6px;">
      ℹ️ Log in to scan private repos and create PRs. Paste a public repo URL for quick scans.
    </div>
    <div class="progress-bar" id="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  </div>

  <!-- Stats -->
  <div class="box stats">
    <span class="stat-box">Files <span class="stat-val" id="s-files">0</span></span>
    <span class="stat-box">Issues <span class="stat-val" id="s-issues">0</span></span>
    <span class="stat-box">Last <span class="stat-val" id="s-time">—</span></span>
  </div>

  <!-- Log -->
  <div class="box log-container">
    <div class="log-header">
      <span>📋 Log</span>
      <button class="btn btn-ghost" onclick="clearLog()">clear</button>
    </div>
    <div class="log-box" id="log-box">
      <div class="log-line">
        <span class="log-ts">--:--:--</span>
        <span class="log-tag tag-sys">SYS</span>
        <span>Ready. Enter a repo URL or login to select one.</span>
      </div>
    </div>
  </div>

  <!-- Report Area -->
  <div id="report-area" style="display:none;margin-top:14px;">
    <div class="box report-panel">
      <div class="panel-title">
        <span>📊 Scan Report</span>
        <div class="flex">
          <button class="btn btn-ghost" id="fix-btn" onclick="generateFixes()" style="display:none;">🔧 Apply Fixes</button>
          <button class="btn btn-primary" id="pr-btn" onclick="createPR()" style="display:none;">🔀 Create PR</button>
        </div>
      </div>
      <div id="report-content" style="padding:12px;"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <script>
    /* ─── STATE ────────────────────────────────────────────────── */
    const STATE = {
      user: null,
      token: null,
      repoUrl: null,
      repoOwner: null,
      repoName: null,
      scanResults: null,
      fixes: null,
    };

    /* ─── DOM HELPERS ──────────────────────────────────────────── */
    const $ = id => document.getElementById(id);
    const logBox = $('log-box');
    const statusBadge = $('status-badge');

    function ts() { return new Date().toLocaleTimeString('en-GB', { hour12: false }); }

    function log(tag, cls, msg) {
      const line = document.createElement('div');
      line.className = 'log-line';
      line.innerHTML = `<span class="log-ts">${ts()}</span><span class="log-tag ${cls}">${tag}</span><span>${escHtml(msg)}</span>`;
      logBox.appendChild(line);
      logBox.scrollTop = logBox.scrollHeight;
    }

    function clearLog() { logBox.innerHTML = ''; log('SYS', 'tag-sys', 'Log cleared.'); }

    function escHtml(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

    function toast(msg) {
      const el = $('toast');
      el.textContent = msg;
      el.style.opacity = '1';
      clearTimeout(window.toastTimer);
      window.toastTimer = setTimeout(() => el.style.opacity = '0', 2500);
    }

    /* ─── AUTH ──────────────────────────────────────────────────── */
    async function checkAuth() {
      const res = await fetch('/api/user');
      const data = await res.json();
      if (data.user) {
        STATE.user = data.user;
        STATE.token = data.token;
        $('user-info').textContent = `👤 ${data.user.login}`;
        $('login-btn').textContent = 'Logout';
        $('login-btn').onclick = () => window.location.href = '/auth/logout';
        // Show repo selector
        $('repo-select').style.display = 'inline-block';
        $('scan-logged-btn').style.display = 'inline-flex';
        await loadRepos();
      } else {
        $('user-info').textContent = '';
        $('login-btn').textContent = 'Login with GitHub';
        $('login-btn').onclick = login;
        $('repo-select').style.display = 'none';
        $('scan-logged-btn').style.display = 'none';
      }
    }

    function login() {
      window.location.href = '/auth/github';
    }

    async function loadRepos() {
      const res = await fetch('/api/repos');
      const repos = await res.json();
      const select = $('repo-select');
      select.innerHTML = '<option value="">Select repo</option>';
      for (const repo of repos) {
        const opt = document.createElement('option');
        opt.value = repo.full_name;
        opt.textContent = repo.full_name;
        select.appendChild(opt);
      }
    }

    function selectRepo() {
      const val = $('repo-select').value;
      if (val) {
        const [owner, name] = val.split('/');
        STATE.repoUrl = `https://github.com/${val}.git`;
        STATE.repoOwner = owner;
        STATE.repoName = name;
        $('repo-url-input').value = STATE.repoUrl;
      }
    }

    /* ─── SCANNING ─────────────────────────────────────────────── */
    async function scanManual() {
      const url = $('repo-url-input').value.trim();
      if (!url) { toast('⚠ Enter a repo URL'); return; }
      // Parse owner/name
      const match = url.match(/github\.com\/([^\/]+)\/([^\/]+)(?:\.git)?/);
      if (!match) { toast('⚠ Invalid GitHub URL'); return; }
      STATE.repoOwner = match[1];
      STATE.repoName = match[2];
      STATE.repoUrl = url;
      await doScan(null);
    }

    async function scanLoggedIn() {
      if (!STATE.repoUrl) { toast('⚠ Select a repo first'); return; }
      await doScan(STATE.token);
    }

    async function doScan(token) {
      const payload = {
        repoUrl: STATE.repoUrl,
        repoOwner: STATE.repoOwner,
        repoName: STATE.repoName,
        token: token || null,
      };
      $('report-area').style.display = 'none';
      $('fix-btn').style.display = 'none';
      $('pr-btn').style.display = 'none';
      const progressFill = $('progress-fill');
      const progressBar = $('progress-bar');
      progressBar.style.display = 'block';
      progressFill.style.width = '10%';
      log('SCAN', 'tag-info', `Scanning ${STATE.repoOwner}/${STATE.repoName}...`);

      try {
        const res = await fetch('/api/scan-repo', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        progressFill.style.width = '80%';
        const data = await res.json();
        if (!data.success) throw new Error(data.error);
        STATE.scanResults = data.results;
        progressFill.style.width = '100%';
        setTimeout(() => { progressBar.style.display = 'none'; }, 600);
        renderReport(data.results);
        $('report-area').style.display = 'block';
        $('fix-btn').style.display = 'inline-flex';
        log('SCAN', 'tag-ok', `Scan complete: ${data.results.length} files analyzed`);
        toast('✅ Scan complete');
      } catch (e) {
        log('SCAN', 'tag-err', e.message);
        toast('❌ ' + e.message);
        progressBar.style.display = 'none';
      }
    }

    function renderReport(results) {
      const container = $('report-content');
      const totalFiles = results.length;
      const totalIssues = results.reduce((sum, f) => sum + f.issues.length, 0);
      let html = `
        <div class="summary-box">
          <div class="summary-line"><span>Files scanned</span><span class="val">${totalFiles}</span></div>
          <div class="summary-line"><span>Total issues</span><span class="val red">${totalIssues}</span></div>
        </div>
      `;
      if (!totalIssues) {
        html += `<div style="color:#00ffa3;margin-top:12px;">✅ No issues found. Great job!</div>`;
      } else {
        for (const item of results) {
          if (!item.issues.length) continue;
          html += `<div style="font-weight:700;color:#58a6ff;margin-top:12px;">📄 ${item.file}</div>`;
          for (const issue of item.issues) {
            const sevClass = (issue.severity || 'MED').toLowerCase();
            html += `
              <div class="bug-item" style="border-left:2px solid ${sevClass==='high'?'#ff5370':sevClass==='med'?'#ffb547':'#58a6ff'};">
                <span class="sev-${sevClass}" style="font-weight:700;font-size:10px;padding:1px 6px;border-radius:3px;margin-right:6px;">[${(issue.severity || 'MED').toUpperCase()}]</span>
                <span>${escHtml(issue.description || 'Issue')}</span>
                ${issue.fix ? `<div class="fix-suggestion">💡 ${escHtml(issue.fix)}</div>` : ''}
              </div>
            `;
          }
        }
      }
      container.innerHTML = html;
      $('s-files').textContent = totalFiles;
      $('s-issues').textContent = totalIssues;
      $('s-time').textContent = new Date().toLocaleTimeString();
    }

    /* ─── FIXES & PR ───────────────────────────────────────────── */
    async function generateFixes() {
      if (!STATE.scanResults) return;
      const files = STATE.scanResults
        .filter(f => f.issues.length > 0)
        .map(f => ({ file: f.file, code: f.code || '', issues: f.issues }));
      // We need file contents; we didn't store them. We'll re-fetch or use the clone result.
      // For simplicity, we'll prompt user to scan again? Actually we can store code during scan.
      // We'll update the scan to return code as well. For now, let's ask user to re-scan with code.
      toast('⚠ Please re-scan the repo first (we need file content)');
    }

    // We'll extend the scan to store code per file in STATE.scanFiles.
    // For now, we'll keep it simple.
  </script>

</body>
</html>
